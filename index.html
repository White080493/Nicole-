<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Fortune Game</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#FFE5F1,#FFD1EC);
overflow:hidden;
}

/* 屏幕 */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
.hidden{display:none;}

#player{
position:absolute;
bottom:90px;
font-size:60px;
}

.item{position:absolute;font-size:32px;}

#controls{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
}

.control-btn{
width:80px;height:80px;
border-radius:50%;
border:none;
background:#ff6fb5;
color:white;
font-size:28px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff6fb5;
color:white;
margin-top:10px;
}

/* ❤️ 爱心 */
.heart{
position:absolute;
animation:float 1s forwards;
}
@keyframes float{
0%{opacity:1;}
100%{opacity:0;transform:translateY(-80px) scale(1.5);}
}

/* 🎆 烟花 */
.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}
@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:translate(var(--x),var(--y)) scale(0.5);opacity:0;}
}
</style>
</head>

<body>

<!-- 🎀 Start -->
<div id="startScreen" class="screen">
<h1>🎂 Happy Birthday Jussie 🎂</h1>
<p>Catch sweet fortune 💖</p>
<button onclick="startGame()">Start</button>
</div>

<!-- 🎮 Game -->
<div id="gameScreen" class="screen hidden">
<div id="game" style="width:100%;height:100%;position:relative;">

<div id="player">🐱</div>

<div style="position:absolute;top:10px;width:100%;display:flex;justify-content:space-between;padding:0 15px;">
<div id="time">Time:30</div>
<div id="score">Score:0</div>
</div>

<div id="controls">
<button class="control-btn" id="left">⬅</button>
<button class="control-btn" id="right">➡</button>
</div>

</div>
</div>

<!-- 🎉 End -->
<div id="endScreen" class="screen hidden">
<h2 id="finalTitle"></h2>
<p id="finalScore"></p>
<p id="fortuneMsg"></p>

<button onclick="shareWhatsApp()">📱 Share</button>
<button onclick="downloadImage()">📸 Save</button>
<button onclick="restartGame()">Play Again</button>
</div>

<audio id="bgm" loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.wav">
</audio>

<script>
const player=document.getElementById('player');
const bgm=document.getElementById('bgm');

let x=window.innerWidth/2;
let velocity=0,accel=0;
let score=0,time=30,items=[];

let finalDays=0;

const desserts=['🍰','🧁','🍩','🍭'];

function show(s){
['startScreen','gameScreen','endScreen'].forEach(id=>{
document.getElementById(id).classList.add('hidden');
});
document.getElementById(s).classList.remove('hidden');
}

function startGame(){
show('gameScreen');
bgm.play();
score=0;time=30;items=[];
updateUI();
}

function updateUI(){
scoreEl.innerText="Score:"+score;
timeEl.innerText="Time:"+time;
}

const scoreEl=document.getElementById('score');
const timeEl=document.getElementById('time');

/* 控制 */
left.onmousedown=()=>accel=-0.7;
right.onmousedown=()=>accel=0.7;
document.onmouseup=()=>accel=0;

/* 掉落 */
setInterval(()=>{
if(time<=0)return;

let el=document.createElement('div');
let bomb=Math.random()<0.2;

el.className='item';
el.innerText=bomb?'💣':desserts[Math.floor(Math.random()*desserts.length)];

el.style.left=Math.random()*(window.innerWidth-30)+'px';
el.style.top='0px';

game.appendChild(el);
items.push({el,bomb});
},600);

/* ❤️ 爱心 */
function heartBurst(x,y){
for(let i=0;i<6;i++){
let h=document.createElement('div');
h.className='heart';
h.innerText='💖';
h.style.left=x+'px';
h.style.top=y+'px';
game.appendChild(h);
setTimeout(()=>h.remove(),1000);
}
}

/* 🎆 烟花 */
function fireworkBurst(x,y){
for(let i=0;i<20;i++){
let f=document.createElement('div');
f.className='firework';
f.style.background=`hsl(${Math.random()*360},100%,60%)`;

let angle=Math.random()*2*Math.PI;
let distance=80+Math.random()*40;

f.style.setProperty('--x',Math.cos(angle)*distance+'px');
f.style.setProperty('--y',Math.sin(angle)*distance+'px');

f.style.left=x+'px';
f.style.top=y+'px';

document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
}

/* 主循环 */
function loop(){

velocity+=accel;
velocity*=0.9;
x+=velocity;

if(x<0)x=0;
if(x>window.innerWidth-50)x=window.innerWidth-50;

let bounce=Math.sin(Date.now()/120)*5;
player.style.left=x+'px';
player.style.transform=`translateY(${bounce}px) rotate(${velocity*2}deg)`;

items.forEach((o,i)=>{
let top=o.el.offsetTop+4;
o.el.style.top=top+'px';

let p=player.getBoundingClientRect();
let r=o.el.getBoundingClientRect();

if(r.bottom>=p.top && r.left<p.right && r.right>p.left){
if(!o.bomb){
score+=10;
heartBurst(r.left,r.top);
}else{
score-=5;
}
o.el.remove();
items.splice(i,1);
updateUI();
}

if(top>window.innerHeight){
o.el.remove();
items.splice(i,1);
}
});

requestAnimationFrame(loop);
}
loop();

/* 时间 */
setInterval(()=>{
if(time<=0)return;
time--;
updateUI();
if(time<=0) endGame();
},1000);

/* 🎉 结束 */
function endGame(){
bgm.pause();
show('endScreen');

let msg;

if(score>120){msg="🌟 Super Lucky!";finalDays=365;}
else if(score>70){msg="✨ Very Lucky!";finalDays=200;}
else{msg="💖 Sweet Lucky!";finalDays=100;}

finalTitle.innerText="🎂 Happy Birthday Jussie 🎂";
finalScore.innerText="You got "+score+" fortune points!";
fortuneMsg.innerText=msg+" For next "+finalDays+" days you will be extra lucky!";

/* 🎆 烟花连发 */
for(let i=0;i<8;i++){
setTimeout(()=>{
fireworkBurst(
Math.random()*window.innerWidth,
Math.random()*window.innerHeight/2
);
},i*300);
}
}

/* 📱 分享 */
function shareWhatsApp(){
let text=`🎂 Happy Birthday Jussie 🎂\nI got ${score} fortune points!\nYou will be lucky for ${finalDays} days 💖`;
let url="https://wa.me/?text="+encodeURIComponent(text);
window.open(url,"_blank");
}

/* 📸 截图 */
function downloadImage(){
html2canvas(document.body).then(canvas=>{
let link=document.createElement('a');
link.download="Birthday.png";
link.href=canvas.toDataURL();
link.click();
});
}

/* 重来 */
function restartGame(){
location.reload();
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
