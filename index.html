<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune Cat Birthday Game</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:#FFE5F1;
    font-family:sans-serif;
}

#game {
    width:100vw;
    height:100vh;
    position:relative;
}

#player {
    position:absolute;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    font-size:50px;
    transition: transform 0.1s;
}

.item {
    position:absolute;
    font-size:32px;
}

#ui {
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}

button{
    position:absolute;
    bottom:20px;
    width:80px;
    height:80px;
    border:none;
    border-radius:50%;
    font-size:24px;
    background:#ff6fb5;
    color:white;
}

#left{left:20px;}
#right{right:20px;}
</style>
</head>

<body>

<div id="game">

<div id="player">🐱</div>

<div id="ui">
<div id="time">Time:30</div>
<div id="score">Score:0</div>
</div>

<button id="left">⬅</button>
<button id="right">➡</button>

</div>

<script>
const player=document.getElementById('player');

let x=window.innerWidth/2;
let velocity=0;
let accel=0;

let score=0;
let time=30;
let items=[];

const desserts=['🍰','🧁','🍩','🍭'];

function updateUI(){
document.getElementById('score').innerText="Score:"+score;
document.getElementById('time').innerText="Time:"+time;
}

// 🎮 控制（更丝滑）
document.getElementById('left').onmousedown=()=>accel=-0.5;
document.getElementById('right').onmousedown=()=>accel=0.5;
document.onmouseup=()=>accel=0;

// 键盘支持
document.onkeydown=e=>{
if(e.key==="ArrowLeft") accel=-0.5;
if(e.key==="ArrowRight") accel=0.5;
}
document.onkeyup=()=>accel=0;


// 🍰 生成物件
setInterval(()=>{
let el=document.createElement('div');

let bomb=Math.random()<0.2;
el.className='item';
el.innerText=bomb?'💣':desserts[Math.floor(Math.random()*desserts.length)];

el.style.left=Math.random()*(window.innerWidth-30)+'px';
el.style.top='0px';

game.appendChild(el);

items.push({el,bomb});
},700);


// 🎯 游戏主循环（丝滑关键）
function loop(){

// 移动系统（惯性 + 阻力）
velocity+=accel;
velocity*=0.92; // 阻力

x+=velocity;

if(x<0) x=0;
if(x>window.innerWidth-40) x=window.innerWidth-40;

player.style.left=x+'px';

// 猫咪微动画（更生动）
player.style.transform=`translateX(0px) rotate(${velocity*2}deg)`;


// 掉落逻辑
items.forEach((o,i)=>{
let top=o.el.offsetTop+3;
o.el.style.top=top+'px';

let p=player.getBoundingClientRect();
let r=o.el.getBoundingClientRect();

if(r.bottom>=p.top && r.left<p.right && r.right>p.left){

score+=o.bomb?-5:10;
o.el.remove();
items.splice(i,1);
updateUI();
}

if(top>window.innerHeight){
o.el.remove();
items.splice(i,1);
}
});

requestAnimationFrame(loop);
}
loop();


// ⏱ 时间
setInterval(()=>{
time--;
updateUI();

if(time<=0){
alert("Final Score: "+score);
location.reload();
}
},1000);

</script>

</body>
</html>
